# File only; the Rich console handler is added in code (see src/utils/logger.py)
version: 1
disable_existing_loggers: false

formatters:
  filefmt:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    datefmt: "%H:%M:%S"

handlers:
  file:
    class: logging.FileHandler
    level: INFO
    formatter: filefmt
    filename: outputs/logs/app.log

root:
  level: INFO
  handlers: [file]
